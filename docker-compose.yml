services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: America/Argentina/Buenos_Aires
      POSTGRES_USER: ${POSTGRES_USER:-asistencia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asistencia123}
      POSTGRES_DB: ${POSTGRES_DB:-asistencia}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asistencia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: dahua-app
    ports:
      - "3000:3000"
    cap_add:
      - NET_ADMIN
    networks:
      - default
      - caddy_net
      - vpn_net
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - DAHUA_HOST=${DAHUA_HOST}
      - DAHUA_USER=${DAHUA_USER}
      - DAHUA_PASSWORD=${DAHUA_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:-asistencia-escolar-secret}
      - APP_NAME=${APP_NAME:-Asistencia Escolar}
      - APP_LOGO_URL=${APP_LOGO_URL:-}
      - APP_ACCENT_COLOR=${APP_ACCENT_COLOR:-}
      - APP_CLUB_NAME=${APP_CLUB_NAME:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-asistencia}:${POSTGRES_PASSWORD:-asistencia123}@db:5432/${POSTGRES_DB:-asistencia}
      - RUN_SEED=0
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    labels:
      caddy: ${CADDY_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3000}}"
    restart: unless-stopped

volumes:
  db_data:

networks:
  default:
  caddy_net:
    external: true
  vpn_net:
    external: true
